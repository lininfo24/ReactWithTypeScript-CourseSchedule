name: Vitest Unit Tests  
  
on:  
  push:  
    branches: [main]  
  pull_request:
    branches: [main]
  
jobs:  
  test:  
    runs-on: ubuntu-latest    
    steps:  
      - uses: actions/checkout@v4  
      - name: Set up Node.js  
        uses: actions/setup-node@v4  
        with:  
          node-version: lts/*  
  
      - name: Install dependencies  
        run: npm ci
        working-directory: reactwithtypescript
  
      - name: Run Vitest  
        run: npx vitest
        working-directory: reactwithtypescript
