name: Vitest Unit Tests  
  
on:  
  push:  
    branches: [ main, develop ]  
  pull_request:
    branches: [ main, develop ]
  
jobs:  
  test:  
    runs-on: ubuntu-latest  
  
    steps:  
      - uses: actions/checkout@v4  
  
      - name: Set up Node.js  
        uses: actions/setup-node@v4  
        with:  
          node-version: lts/*  
  
      - name: Install dependencies  
        run: npm ci  
  
      - name: Run Vitest  
        run: npx vitest 
